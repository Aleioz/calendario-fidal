name: Aggiornamento Automatico Calendario Fidal

on:
  schedule:
    - cron: '0 3 * * *' # Gira ogni notte alle 03:00
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Installa Librerie
      run: pip install -r requirements.txt
       
    - name: Esegui Script
      run: python calendario_fidal.py
       
    - name: Salva e Aggiorna il file .ics su GitHub
      run: |
        git config --global user.name 'Calendar Bot'
        git config --global user.email 'bot@example.com'
        git add calendario_toscana.ics
        git commit -m "Aggiornamento automatico gare FIDAL" || exit 0
        git push
